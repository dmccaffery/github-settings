name: Release

# Drives releases within the org rulesets for public repos:
#   - opens a `release-please--*` release PR branch, the prefix that
#     `public-fork-only` allows to be created directly in the repo;
#   - tags releases as vX.Y.Z, the only tags `public-version-tags-only`
#     permits, which `public-immutable-tags` then freezes;
#   - commits with the GITHUB_TOKEN, which GitHub signs as verified, so the
#     release commit satisfies `required_signatures` on protected branches.
#
# Manifest mode is used: configuration lives in release-please-config.json and
# the current version in .release-please-manifest.json at the repo root.

on:
  push:
    branches: [main]

permissions:
  # create release commits, tags, and GitHub Releases
  contents: write
  # open and update the release PR
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
